<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenShift RAG Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .msg-user {
      background: #1e40af;
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      max-width: 75%;
      margin-left: auto;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg-assistant {
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px 20px;
      border-radius: 18px 18px 18px 4px;
      max-width: 85%;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.7;
    }

    /* Markdown inside assistant messages */
    .msg-assistant h1 { font-size: 1.3rem; font-weight: 700; margin: 0 0 0.5rem; color: #f1f5f9; }
    .msg-assistant h2 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #f1f5f9; }
    .msg-assistant h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.3rem; color: #cbd5e1; }
    .msg-assistant p { margin: 0.4rem 0; }
    .msg-assistant ul, .msg-assistant ol { margin: 0.4rem 0 0.4rem 1.5rem; }
    .msg-assistant li { margin: 0.2rem 0; }
    .msg-assistant code { background: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', Monaco, monospace; }
    .msg-assistant pre { background: #0f172a; padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
    .msg-assistant pre code { background: none; padding: 0; font-size: 12px; }
    .msg-assistant blockquote { border-left: 3px solid #f59e0b; padding: 8px 12px; background: rgba(245, 158, 11, 0.1); margin: 0.5rem 0; border-radius: 0 6px 6px 0; }
    .msg-assistant a { color: #60a5fa; text-decoration: underline; }
    .msg-assistant table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; }
    .msg-assistant th, .msg-assistant td { border: 1px solid #334155; padding: 6px 10px; text-align: left; font-size: 13px; }
    .msg-assistant th { background: #0f172a; font-weight: 600; }

    .sources-toggle {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
      user-select: none;
    }
    .sources-toggle:hover { color: #94a3b8; }

    .sources-list {
      margin-top: 6px;
      padding: 8px 12px;
      background: #0f172a;
      border-radius: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .sources-list div { padding: 2px 0; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 16px 20px;
      background: #1e293b;
      border-radius: 18px 18px 18px 4px;
      max-width: 80px;
      margin-bottom: 16px;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #475569;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 16px;
      background: #0f172a;
      border-top: 1px solid #1e293b;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      background: #1e293b;
      border-radius: 24px;
      padding: 4px 4px 4px 16px;
      border: 1px solid #334155;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: #3b82f6; }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      padding: 8px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }
    #chat-input::placeholder { color: #64748b; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #2563eb; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }

    .welcome {
      text-align: center;
      color: #64748b;
      margin-top: 30vh;
    }
    .welcome h1 { font-size: 1.5rem; color: #e2e8f0; margin-bottom: 8px; }
    .welcome p { font-size: 14px; margin: 4px 0; }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .suggestion-chip {
      padding: 8px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-chip:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h1>OpenShift RAG Assistant</h1>
        <p>Ask me anything about OpenShift installation, operations, and troubleshooting.</p>
        <p style="font-size: 12px; margin-top: 4px; color: #475569;">Powered by RAG over official OpenShift documentation</p>
        <div class="suggestion-chips">
          <div class="suggestion-chip" onclick="askSuggestion(this)">How do I install OpenShift 4.21?</div>
          <div class="suggestion-chip" onclick="askSuggestion(this)">How to troubleshoot failing pods?</div>
          <div class="suggestion-chip" onclick="askSuggestion(this)">What is the upgrade process for OCP?</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="Ask about OpenShift..." onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
    });

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeEl = document.getElementById('welcome');
    let busy = false;

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    function askSuggestion(el) {
      inputEl.value = el.textContent;
      sendMessage();
    }

    function addUserMessage(text) {
      if (welcomeEl) welcomeEl.remove();
      const div = document.createElement('div');
      div.className = 'msg-user';
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollDown();
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      scrollDown();
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function addAssistantMessage(answer, sources) {
      removeTypingIndicator();
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-assistant';

      const content = document.createElement('div');
      content.innerHTML = marked.parse(answer || 'Sorry, I could not generate an answer.');
      wrapper.appendChild(content);

      if (sources && sources.length > 0) {
        const toggle = document.createElement('div');
        toggle.className = 'sources-toggle';
        toggle.textContent = `${sources.length} sources`;
        const sourcesList = document.createElement('div');
        sourcesList.className = 'sources-list';
        sourcesList.style.display = 'none';
        sources.forEach(s => {
          const d = document.createElement('div');
          d.textContent = s.title || s.doc_id || s.source || 'Unknown source';
          sourcesList.appendChild(d);
        });
        toggle.onclick = () => {
          sourcesList.style.display = sourcesList.style.display === 'none' ? 'block' : 'none';
          toggle.textContent = sourcesList.style.display === 'none'
            ? `${sources.length} sources`
            : `Hide sources`;
        };
        wrapper.appendChild(toggle);
        wrapper.appendChild(sourcesList);
      }

      messagesEl.appendChild(wrapper);
      scrollDown();
    }

    function addErrorMessage(error) {
      removeTypingIndicator();
      const div = document.createElement('div');
      div.className = 'msg-assistant';
      div.innerHTML = `<span style="color: #f87171;">Error: ${error}</span>`;
      messagesEl.appendChild(div);
      scrollDown();
    }

    function scrollDown() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      addUserMessage(text);
      addTypingIndicator();

      try {
        const resp = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: text,
            rewrite: true,
            hybrid: true,
            rerank: true,
          }),
        });
        const data = await resp.json();

        if (data.error) {
          addErrorMessage(data.error);
        } else {
          addAssistantMessage(data.answer, data.sources);
        }
      } catch (err) {
        addErrorMessage('Failed to connect to the server.');
      }

      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    inputEl.focus();
  </script>
</body>
</html>
