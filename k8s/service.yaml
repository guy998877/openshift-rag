# Internal service — only reachable by nginx, not exposed outside the cluster
apiVersion: v1
kind: Service
metadata:
  name: rag-app
spec:
  selector:
    app: rag-app
  ports:
    - port: 8000
      targetPort: 8000
---
# Client-facing service — nginx is the entry point
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
