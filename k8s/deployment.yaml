apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
    spec:
      initContainers:
        - name: seed-chroma
          image: rag-openshift-doco:local
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -f /chroma-pvc/chroma.sqlite3 ]; then
                echo "Seeding ChromaDB from image..."
                cp -r /app/chroma_db/. /chroma-pvc/
                echo "Done."
              else
                echo "ChromaDB already initialized, skipping seed."
              fi
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma-pvc
      containers:
        - name: rag-app
          image: rag-openshift-doco:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-app-secrets
                  key: OPENAI_API_KEY
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_db
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
