apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: asciidoc-converter
spec:
  running: true
  template:
    metadata:
      labels:
        app: asciidoc-converter
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:40
        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #cloud-config
              packages:
                - ruby
                - python3
              runcmd:
                - gem install asciidoctor
                - |
                  cat > /usr/local/bin/adoc-server.py << 'PYEOF'
                  #!/usr/bin/env python3
                  from http.server import HTTPServer, BaseHTTPRequestHandler
                  import subprocess

                  class Handler(BaseHTTPRequestHandler):
                      def do_GET(self):
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"asciidoc-converter ready\n")
                      def do_POST(self):
                          n = int(self.headers.get("Content-Length", 0))
                          body = self.rfile.read(n).decode()
                          r = subprocess.run(
                              ["asciidoctor", "-s", "-", "-o", "-"],
                              input=body, capture_output=True, text=True
                          )
                          self.send_response(200)
                          self.send_header("Content-Type", "text/html")
                          self.end_headers()
                          self.wfile.write(r.stdout.encode())
                      def log_message(self, fmt, *args):
                          pass
                  HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
                  PYEOF
                - python3 /usr/local/bin/adoc-server.py &
